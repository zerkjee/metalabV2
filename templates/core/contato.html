{% extends "base.html" %}
{% block titulo %}Contato — {{ LOJA_NOME }}{% endblock %}

{% block conteudo %}
<div class="container mt-5" style="max-width: 760px;">
  <h1 class="h3 fw-bold mb-4">Fale com a gente</h1>
  <div class="row g-3">
    <div class="col-12 col-md-6">
      <div class="p-4 bg-cinza rounded-3 h-100">
        <i class="bi bi-envelope fs-3 text-verde"></i>
        <h2 class="h6 fw-bold mt-2">E-mail</h2>
        <p class="mb-0">mlmetalab@gmail.com</p>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <div class="p-4 bg-cinza rounded-3 h-100">
        <i class="bi bi-whatsapp fs-3 text-verde"></i>
        <h2 class="h6 fw-bold mt-2">WhatsApp</h2>
        <p class="mb-0">Atendimento de segunda a sexta, 9h às 18h.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
