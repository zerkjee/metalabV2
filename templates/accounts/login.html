{% extends "base.html" %}
{% block titulo %}Entrar — {{ LOJA_NOME }}{% endblock %}

{% block conteudo %}
<div class="container mt-5" style="max-width: 420px;">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 fw-bold text-center mb-4">Entrar na minha conta</h1>
      <form method="post" novalidate>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        <div class="mb-3">
          <label class="form-label" for="{{ form.username.id_for_label }}">Usuário</label>
          <input type="text" name="username" id="{{ form.username.id_for_label }}"
                 class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="{{ form.password.id_for_label }}">Senha</label>
          <input type="password" name="password" id="{{ form.password.id_for_label }}"
                 class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
